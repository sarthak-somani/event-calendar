<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IITB Event Hub</title>
    <meta name="description" content="Discover upcoming events at IIT Bombay — seminars, workshops, cultural events, and more, aggregated automatically from student notices.">
    <meta property="og:title" content="IITB Event Hub">
    <meta property="og:description" content="Discover upcoming events at IIT Bombay, aggregated automatically from student notices.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#4A90E2" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>IITB Event Hub</h1>
            <p class="header-subtitle">Events at IIT Bombay, updated hourly</p>
        </div>
    </header>

    <main class="container">
        <div id="calendar-container">
            <div id="calendar-loading" class="loading-overlay" hidden>
                <div class="spinner"></div>
                <span>Loading events&hellip;</span>
            </div>
            <div id="calendar-error" class="error-banner" hidden>
                &#9888;&nbsp; Failed to load events. Please refresh the page.
            </div>
            <div id="calendar"></div>
        </div>

        <aside id="event-list-container" aria-label="Upcoming events">
            <h2>
                Upcoming Events
                <span id="event-count" class="event-count" hidden></span>
            </h2>
            <ul id="event-list" aria-live="polite">
                <li class="no-events">Loading events&hellip;</li>
            </ul>
        </aside>
    </main>

    <!-- Tab bar — visible on mobile only, hidden via CSS on desktop -->
    <nav class="mobile-nav" aria-label="View">
        <button class="mobile-tab is-active" data-target="event-list-container" aria-selected="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/>
                <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
            <span>Upcoming</span>
        </button>
        <button class="mobile-tab" data-target="calendar-container" aria-selected="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Calendar</span>
        </button>
    </nav>
</body>
</html>
